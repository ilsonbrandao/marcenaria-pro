name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      # O build precisa de DATABASE_URL só para não falhar no import de lib/db,
      # que faz throw sem ela. Não conecta a banco nenhum durante o build.
      - run: npm run build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          DATABASE_SSL: 'false'

  secrets:
    name: varredura de segredos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
